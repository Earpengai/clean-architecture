services:
  web-api:
    image: ${DOCKER_REGISTRY-}webapi
    container_name: web-api
    build:
      context: .
      dockerfile: src/Web.Api/Dockerfile
    ports:
      - 5000:8080
      - 5001:8081

  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      - POSTGRES_DB=clean-architecture
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/db:/var/lib/postgresql/data
    ports:
      - 5432:5432

  seq:
    image: datalust/seq:2024.3
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - 8081:80

  ui:
    image: node:22-alpine
    container_name: ui
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    ports:
      - 5173:5173
    volumes:
      - ./src/ui:/app
      - ui_node_modules:/app/node_modules
    environment:
      - VITE_API_TARGET=http://web-api:8080
    depends_on:
      - web-api

volumes:
  ui_node_modules:
